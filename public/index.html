<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBomb Web - SMS/Call Testing Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0F0F0F;
            color: #FFFFFF;
            overflow: hidden;
        }

        /* Theme Colors */
        :root {
            --bg-dark: #0F0F0F;
            --bg-medium: #1E1E1E;
            --bg-light: #2D2D2D;
            --accent-primary: #4A90E2;
            --accent-success: #28A745;
            --accent-danger: #DC3545;
            --accent-warning: #FFC107;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header {
            padding: 30px 20px 20px 20px;
            text-align: center;
        }

        .sidebar-header h1 {
            color: var(--accent-primary);
            font-size: 28px;
            font-weight: bold;
        }

        .sidebar-header p {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 5px;
        }

        .mode-buttons {
            flex: 1;
            padding: 20px;
        }

        .mode-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: var(--bg-light);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
        }

        .mode-btn:hover {
            background-color: var(--accent-primary);
        }

        .mode-btn.active {
            background-color: var(--accent-primary);
        }

        .status-indicator {
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
        }

        .status-ready {
            color: var(--accent-success);
        }

        .status-running {
            color: var(--accent-warning);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            background-color: var(--bg-medium);
            overflow-y: auto;
        }

        .header {
            padding: 20px 30px;
            background-color: var(--bg-medium);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 20px;
        }

        .version {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Control Panel */
        .control-panel {
            background-color: var(--bg-light);
            margin: 20px;
            border-radius: 12px;
            padding: 20px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-group input {
            flex: 1;
        }

        .slider-value {
            min-width: 40px;
            text-align: center;
        }

        .example-note {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .settings-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .progress-section {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background-color: var(--bg-dark);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-primary);
            transition: width 0.3s ease;
            width: 0%;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            font-size: 14px;
        }

        .stat-success { color: var(--accent-success); }
        .stat-danger { color: var(--accent-danger); }
        .stat-secondary { color: var(--text-secondary); }

        .button-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background-color: var(--accent-success);
            color: white;
        }

        .btn-start:hover:not(:disabled) {
            background-color: #1e7e34;
        }

        .btn-stop {
            background-color: var(--accent-danger);
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            background-color: #c82333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Log Area */
        .log-area {
            background-color: var(--bg-light);
            margin: 20px;
            border-radius: 12px;
            padding: 15px;
        }

        .log-header {
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .log-console {
            background-color: var(--bg-dark);
            height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 6px;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-success { color: var(--accent-success); }
        .log-error { color: var(--accent-danger); }
        .log-warning { color: var(--accent-warning); }
        .log-info { color: var(--accent-primary); }

        .timestamp {
            color: var(--text-secondary);
            margin-right: 10px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>TBomb Web</h1>
                <p>SMS/Call Testing Tool</p>
            </div>
            <div class="mode-buttons">
                <button class="mode-btn active" data-mode="sms">📱 SMS Testing</button>
                <button class="mode-btn" data-mode="call">📞 Call Testing</button>
            </div>
            <div class="status-indicator">
                <span id="statusText">● Ready</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h2 id="moduleTitle">SMS Testing Module</h2>
                <span class="version">v2.3.5 (Original APIs)</span>
            </div>

            <div class="control-panel">
                <div class="input-section">
                    <div class="input-row">
                        <div class="input-group">
                            <label>Country Code</label>
                            <select id="countryCode">
                                <option value="91">India (+91)</option>
                                <option value="1">USA (+1)</option>
                                <option value="44">UK (+44)</option>
                                <option value="61">Australia (+61)</option>
                                <option value="977">Nepal (+977)</option>
                                <option value="218">Libya (+218)</option>
                                <option value="86">China (+86)</option>
                                <option value="81">Japan (+81)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="text" id="phoneNumber" placeholder="Enter phone number">
                            <div class="example-note">Supported: India(91), Nepal(977), Libya(218), etc.</div>
                        </div>
                    </div>

                    <div class="settings-row">
                        <div class="input-group">
                            <label>Request Count</label>
                            <div class="slider-group">
                                <input type="range" id="requestCount" min="1" max="500" value="50">
                                <span class="slider-value" id="countValue">50</span>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Delay (seconds)</label>
                            <input type="number" id="delay" step="0.1" value="0.5" min="0">
                        </div>
                        <div class="input-group">
                            <label>Threads</label>
                            <input type="number" id="threads" value="5" min="1" max="20">
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="stats">
                            <span class="stat stat-success" id="successCount">✅ Success: 0</span>
                            <span class="stat stat-danger" id="failedCount">❌ Failed: 0</span>
                            <span class="stat stat-secondary" id="totalCount">📊 Total: 0</span>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-start" id="startBtn">▶ Start Testing</button>
                            <button class="btn btn-stop" id="stopBtn" disabled>⏹ Stop</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="log-area">
                <div class="log-header">Console Output</div>
                <div class="log-console" id="logConsole"></div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let bombingActive = false;
        let currentMode = 'sms';
        let eventSource = null;
        let currentJobId = null;

        // DOM Elements
        const modeBtns = document.querySelectorAll('.mode-btn');
        const moduleTitle = document.getElementById('moduleTitle');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const logConsole = document.getElementById('logConsole');
        const progressFill = document.getElementById('progressFill');
        const successCountEl = document.getElementById('successCount');
        const failedCountEl = document.getElementById('failedCount');
        const totalCountEl = document.getElementById('totalCount');
        const requestCountSlider = document.getElementById('requestCount');
        const countValue = document.getElementById('countValue');
        const phoneNumber = document.getElementById('phoneNumber');
        const countryCode = document.getElementById('countryCode');
        const delayInput = document.getElementById('delay');
        const threadsInput = document.getElementById('threads');

        // Update slider display
        requestCountSlider.addEventListener('input', (e) => {
            countValue.textContent = e.target.value;
        });

        // Mode switching
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                
                const maxCount = currentMode === 'sms' ? 500 : 50;
                requestCountSlider.max = maxCount;
                if (parseInt(requestCountSlider.value) > maxCount) {
                    requestCountSlider.value = maxCount;
                    countValue.textContent = maxCount;
                }
                
                moduleTitle.textContent = currentMode === 'sms' ? 'SMS Testing Module' : 'Call Testing Module';
                addLog(`Switched to ${currentMode.toUpperCase()} testing mode`, 'info');
            });
        });

        function addLog(message, level = 'normal') {
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString();
            const levelClass = {
                'success': 'log-success',
                'error': 'log-error',
                'warning': 'log-warning',
                'info': 'log-info',
                'normal': ''
            }[level] || '';
            
            logEntry.innerHTML = `<span class="timestamp">[${timestamp}]</span> <span class="${levelClass}">${message}</span>`;
            logConsole.appendChild(logEntry);
            logEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function updateStats(success, failed) {
            successCountEl.textContent = `✅ Success: ${success}`;
            failedCountEl.textContent = `❌ Failed: ${failed}`;
            const total = success + failed;
            totalCountEl.textContent = `📊 Total: ${total}`;
            
            const targetCount = parseInt(requestCountSlider.value);
            if (targetCount > 0) {
                const progress = (total / targetCount) * 100;
                progressFill.style.width = `${progress}%`;
            }
        }

        async function startBombing() {
            const phone = phoneNumber.value.trim();
            if (!phone) {
                addLog('Please enter a phone number', 'error');
                return;
            }
            
            const phoneDigits = phone.replace(/[^0-9]/g, '');
            if (phoneDigits.length < 6 || phoneDigits.length > 15) {
                addLog('Please enter a valid phone number (6-15 digits)', 'error');
                return;
            }
            
            const cc = countryCode.value;
            const target = phoneDigits;
            const targetCount = parseInt(requestCountSlider.value);
            const delay = parseFloat(delayInput.value);
            const threads = parseInt(threadsInput.value);
            
            if (isNaN(delay) || delay < 0) {
                addLog('Please enter a valid delay', 'error');
                return;
            }
            
            if (isNaN(threads) || threads < 1 || threads > 20) {
                addLog('Threads must be between 1 and 20', 'error');
                return;
            }
            
            bombingActive = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.innerHTML = '● Running';
            statusText.style.color = '#FFC107';
            
            updateStats(0, 0);
            addLog(`Starting ${currentMode.toUpperCase()} test on +${cc}${target}`, 'info');
            addLog(`Target: ${targetCount} requests, ${threads} threads, ${delay}s delay`, 'info');
            
            try {
                // Close existing connection if any
                if (eventSource) {
                    eventSource.close();
                }
                
                // Start bombing session
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: currentMode,
                        cc: cc,
                        target: target,
                        count: targetCount,
                        delay: delay,
                        threads: threads
                    })
                });
                
                const data = await response.json();
                if (data.jobId) {
                    currentJobId = data.jobId;
                    // Setup SSE for realtime updates
                    setupEventSource(currentJobId);
                } else {
                    throw new Error('No job ID received');
                }
            } catch (error) {
                addLog(`Error starting bombing: ${error.message}`, 'error');
                stopBombing();
            }
        }
        
        function setupEventSource(jobId) {
            eventSource = new EventSource(`/api/events/${jobId}`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleUpdate(data);
            };
            
            eventSource.onerror = () => {
                if (bombingActive) {
                    addLog('Connection lost to server', 'warning');
                }
                eventSource.close();
            };
        }
        
        function handleUpdate(data) {
            switch (data.type) {
                case 'progress':
                    updateStats(data.success, data.failed);
                    if ((data.success + data.failed) % 10 === 0) {
                        addLog(`Progress: ${data.success + data.failed}/${data.targetCount} (Success: ${data.success}, Failed: ${data.failed})`, 'info');
                    }
                    break;
                case 'log':
                    addLog(data.message, data.level);
                    break;
                case 'complete':
                    addLog(`Testing completed! Success: ${data.success}, Failed: ${data.failed}`, 'success');
                    stopBombing();
                    break;
                case 'error':
                    addLog(data.message, 'error');
                    stopBombing();
                    break;
            }
        }
        
        async function stopBombing() {
            bombingActive = false;
            
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            
            if (currentJobId) {
                try {
                    await fetch('/api/stop', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ jobId: currentJobId })
                    });
                } catch (error) {
                    console.error('Error stopping job:', error);
                }
                currentJobId = null;
            }
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerHTML = '● Ready';
            statusText.style.color = '#28A745';
            addLog('Testing stopped', 'warning');
        }
        
        startBtn.addEventListener('click', startBombing);
        stopBtn.addEventListener('click', stopBombing);
        
        // Load country codes from server
        async function loadCountryCodes() {
            try {
                const response = await fetch('/api/countries');
                const countries = await response.json();
                const select = document.getElementById('countryCode');
                if (countries && Object.keys(countries).length > 0) {
                    select.innerHTML = '';
                    for (const [code, name] of Object.entries(countries).slice(0, 50)) {
                        const option = document.createElement('option');
                        option.value = code;
                        option.textContent = `${name} (+${code})`;
                        select.appendChild(option);
                    }
                }
            } catch (error) {
                console.error('Error loading country codes:', error);
            }
        }
        
        loadCountryCodes();
        addLog('TBomb Web initialized with original APIs', 'success');
        addLog('Using apidata.json from original TBomb repository', 'info');
    </script>
</body>
</html>
